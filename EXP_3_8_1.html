<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXP_3_8_1</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{background:#1e1e1e;color:white;font-family:monospace;padding:20px;}
.editor{display:flex;border:1px solid #444;}
#lineNumbers{background:#111;color:#00ff00;padding:10px;text-align:right;white-space:pre;user-select:none;}
#code{flex:1;background:#111;color:white;border:none;padding:10px;resize:none;overflow:auto;white-space:pre;line-height:1.35;}
button{margin-top:10px;margin-right:10px;padding:8px 14px;background:#007acc;color:white;border:none;cursor:pointer;}
#plotBox{margin-top:15px;background:white;padding:10px;display:none;}
#plotBox img{max-width:100%;}
</style>
</head>

<body>

<h3>EXP_3_8_1 — RC Frequency Response</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="plotBox">
<img id="plot1">
</div>

<script>

const code=document.getElementById("code")
const lines=document.getElementById("lineNumbers")
const plotBox=document.getElementById("plotBox")
const plot1=document.getElementById("plot1")

code.value = `import numpy as np
import matplotlib.pyplot as plt

V0 = 5.0
R = 10.0
C = 0.001

frequencies = np.linspace(0.1,1000,1000)
omega = 2*np.pi*frequencies

VR = V0*R/np.sqrt(R**2 + (1/(omega*C))**2)
VC = V0*(1/(omega*C))/np.sqrt(R**2 + (1/(omega*C))**2)

plt.figure(figsize=(12,6))

plt.plot(frequencies,VR,label='Voltage across Resistor V_R',color='blue')
plt.plot(frequencies,VC,label='Voltage across Capacitor V_C',color='orange')

plt.title('Voltages across Resistor and Capacitor in an RC Series AC Circuit')
plt.xlabel('Frequency (Hz)')
plt.ylabel('Voltage (V)')
plt.legend()
plt.grid(True)
plt.show()
`

function updateLines(){
let n=code.value.split("\n").length
let s=""
for(let i=1;i<=n;i++) s+=i+"\n"
lines.textContent=s
}

updateLines()

code.addEventListener("input",updateLines)
code.addEventListener("scroll",()=>lines.scrollTop=code.scrollTop)

let pyodideReady = loadPyodide()

async function run(){

plotBox.style.display="none"

let pyodide = await pyodideReady

await pyodide.loadPackage(["numpy","matplotlib"])

await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
from io import BytesIO
import base64
`)

await pyodide.runPythonAsync(code.value)

let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.figure(1).savefig(buf,format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`)

plot1.src="data:image/png;base64,"+img
plotBox.style.display="block"

await pyodide.runPythonAsync(`
plt.figure(1).savefig("plot.png")
plt.figure(1).savefig("plot.pdf")
`)

}

async function savePNG(){
let pyodide = await pyodideReady
let f = pyodide.FS.readFile("plot.png")
let a=document.createElement("a")
a.href=URL.createObjectURL(new Blob([f],{type:"image/png"}))
a.download="plot.png"
a.click()
}

async function savePDF(){
let pyodide = await pyodideReady
let f = pyodide.FS.readFile("plot.pdf")
let a=document.createElement("a")
a.href=URL.createObjectURL(new Blob([f],{type:"application/pdf"}))
a.download="plot.pdf"
a.click()
}

</script>

</body>
</html>
