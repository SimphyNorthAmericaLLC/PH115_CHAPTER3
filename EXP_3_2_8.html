<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_3_2_8</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: monospace;
    padding: 15px;
}

.editor {
    display: flex;
    border: 1px solid #444;
    height: 340px;
}

#lineNumbers {
    background: #111;
    color: #00ff00;
    padding: 10px 8px;
    margin: 0;
    text-align: right;
    overflow: hidden;
    white-space: pre;
}

#code {
    flex: 1;
    background: #111;
    color: white;
    border: none;
    padding: 10px;
    resize: none;
    overflow: auto;
    white-space: pre;
}

button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 8px 14px;
    background: #007acc;
    color: white;
    border: none;
    cursor: pointer;
}

#output {
    background: #111;
    padding: 10px;
    margin-top: 10px;
    min-height: 80px;
    white-space: pre-wrap;
}

#plot {
    margin-top: 15px;
    background: white;
    padding: 10px;
}
</style>
</head>

<body>

<h3>EXP_3_2_8 — Two-Capacitor RC Network</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt
from scipy.integrate import odeint

R1 = 1
R2 = 3
C1 = 2
C2 = 4
E1 = 5

def equations(y, t):
    V_C1, V_C2 = y
    i_1 = (E1 - V_C1) / R1
    i_3 = (V_C1 - V_C2) / R2
    i_2 = i_1 - i_3
    dV_C1_dt = i_2 / C1
    dV_C2_dt = i_3 / C2
    return [dV_C1_dt, dV_C2_dt]

initial_conditions = [0,0]

time = np.linspace(0,50,1000)

solution = odeint(equations, initial_conditions, time)

V_C1 = solution[:,0]
V_C2 = solution[:,1]

plt.figure(figsize=(10,6))
plt.plot(time, V_C1, label="V_C1(t)")
plt.plot(time, V_C2, label="V_C2(t)")
plt.xlabel("Time (s)")
plt.ylabel("Voltage (V)")
plt.title("Capacitor Voltages Over Time")
plt.legend()
plt.grid(True)
plt.show()
</textarea>
</div>

<button onclick="run()">Run</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="output"></div>
<div id="plot"></div>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const codeEl = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = codeEl.value.split("\n").length;
    let nums = "";
    for (let i = 1; i <= lines; i++) nums += i + "\n";
    lineNumbers.textContent = nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", () => lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

async function run() {
    pyodide = await pyodideReady;
    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").innerHTML = "";

    await pyodide.loadPackage(["numpy", "matplotlib", "micropip"]);

    try {
        await pyodide.runPythonAsync(`
import micropip
try:
    import scipy
except:
    await micropip.install("scipy")
`);

        await pyodide.runPythonAsync(`
import sys, io, base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
sys.stdout = io.StringIO()
`);

        await pyodide.runPythonAsync(codeEl.value);

        let out = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = out;

        const figCount = await pyodide.runPythonAsync("len(plt.get_fignums())");
        if (figCount > 0) {
            const img = await pyodide.runPythonAsync(`
buf = BytesIO()
plt.savefig(buf, format="png", dpi=150, bbox_inches="tight")
buf.seek(0)
base64.b64encode(buf.read()).decode("utf-8")
`);
            document.getElementById("plot").innerHTML =
                "<img id='plotImage' src='data:image/png;base64," + img + "'/>";

            await pyodide.runPythonAsync(`
plt.savefig("plot.png", dpi=200)
plt.savefig("plot.pdf")
`);
        }
    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

async function savePNG(){
    let pyodide = await pyodideReady;
    let data = pyodide.FS.readFile("plot.png");
    let blob = new Blob([data], {type:"image/png"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "plot.png";
    a.click();
}

async function savePDF(){
    let pyodide = await pyodideReady;
    let data = pyodide.FS.readFile("plot.pdf");
    let blob = new Blob([data], {type:"application/pdf"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "plot.pdf";
    a.click();
}
</script>

</body>
</html>
