<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP_3_4_1</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
background:#1e1e1e;
color:white;
font-family:monospace;
padding:20px;
}

.editor{
display:flex;
border:1px solid #444;
}

#lineNumbers{
background:#111;
color:#00ff00;
padding:10px;
text-align:right;
white-space:pre;
user-select:none;
}

#code{
flex:1;
background:#111;
color:white;
border:none;
padding:10px;
resize:none;
overflow:auto;
white-space:pre;
line-height:1.35;
}

button{
margin-top:10px;
margin-right:10px;
padding:8px 14px;
background:#007acc;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:15px;
background:#111;
padding:10px;
}

#plotBox{
margin-top:15px;
background:white;
padding:10px;
display:none;
}

#plotBox img{
max-width:100%;
}
</style>
</head>

<body>

<h3>EXP_3_4_1 — Energy in RC Circuit</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="output"></div>

<div id="plotBox">
<img id="plotImg">
</div>

<script>

const defaultCode = `import numpy as np
import matplotlib.pyplot as plt

V0 = 10
R = 5e-1
C = 1e-3
tau = R*C

t = np.linspace(0,5*tau,1000)

V_capacitor = V0*(1-np.exp(-t/tau))
E_capacitor = 0.5*C*V_capacitor**2

I = (V0/R)*np.exp(-t/tau)

E_resistor = R*np.cumsum(I**2*np.gradient(t))

P_source = V0*I
E_source = np.cumsum(P_source*np.gradient(t))

plt.figure(figsize=(10,6))
plt.plot(t,E_capacitor,label="Energy in Capacitor (J)")
plt.plot(t,E_resistor,label="Energy Dissipated in Resistor (J)")
plt.plot(t,E_source,label="Total Energy from Source (J)")

plt.xlabel("Time (s)")
plt.ylabel("Energy (J)")
plt.title("Energy Distribution in an RC Circuit")
plt.legend()
plt.grid(True)
plt.show()
`

const code = document.getElementById("code")
const lines = document.getElementById("lineNumbers")
const output = document.getElementById("output")
const plotImg = document.getElementById("plotImg")
const plotBox = document.getElementById("plotBox")

code.value = defaultCode

function updateLines(){
let n = code.value.split("\n").length
let s=""
for(let i=1;i<=n;i++) s+=i+"\n"
lines.textContent=s
}

updateLines()

code.addEventListener("input",updateLines)
code.addEventListener("scroll",()=>lines.scrollTop=code.scrollTop)

let pyodideReady = loadPyodide()

async function run(){

plotBox.style.display="none"
output.innerText="Running..."

let pyodide = await pyodideReady

await pyodide.loadPackage(["numpy","matplotlib"])

await pyodide.runPythonAsync(`
import sys, io, base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
sys.stdout = io.StringIO()
`)

await pyodide.runPythonAsync(code.value)

let stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()")
output.innerText = stdout

let figCount = await pyodide.runPythonAsync("len(plt.get_fignums())")

if(figCount>0){

let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.savefig(buf,format="png",dpi=150,bbox_inches="tight")
buf.seek(0)
import base64
base64.b64encode(buf.read()).decode("utf-8")
`)

plotImg.src="data:image/png;base64,"+img
plotBox.style.display="block"

await pyodide.runPythonAsync(`
plt.savefig("plot.png",dpi=200)
plt.savefig("plot.pdf")
`)

}

}

async function savePNG(){
let pyodide = await pyodideReady
let data = pyodide.FS.readFile("plot.png")
let blob = new Blob([data],{type:"image/png"})
let url = URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="plot.png"
a.click()
}

async function savePDF(){
let pyodide = await pyodideReady
let data = pyodide.FS.readFile("plot.pdf")
let blob = new Blob([data],{type:"application/pdf"})
let url = URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="plot.pdf"
a.click()
}

</script>

</body>
</html>
