<style>

#lineNumbers{background:#111;color:#00ff00;padding:10px 8px;margin:0;text-align:right;overflow:hidden;white-space:pre;}

<body>

<h3>EXP_3_9_1 — Displacement Current in Capacitor</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt

epsilon_0 = 8.854e-12

def voltage_across_capacitor_ac(t, V_max, omega):
    return V_max*np.sin(omega*t)

def displacement_current_ac(t, V_max, omega, area, separation):
    electric_field=(V_max*np.sin(omega*t))/separation
    electric_flux=electric_field*area
    d_flux_dt=(V_max*omega*np.cos(omega*t)*area)/separation
    displacement_current=epsilon_0*d_flux_dt
    return displacement_current

V_max=100
f=60
omega=2*np.pi*f
area=0.01
separation=0.001

T=1/f
time_intervals=np.linspace(0,2*T,1000)

voltage_ac=voltage_across_capacitor_ac(time_intervals,V_max,omega)
I_d_ac=displacement_current_ac(time_intervals,V_max,omega,area,separation)

plt.figure()
plt.plot(time_intervals,voltage_ac,label='Voltage (V)',color='r')
plt.title('Voltage Across Capacitor vs Time (AC Source)')
plt.xlabel('Time (s)')
plt.ylabel('Voltage (V)')
plt.grid(True)
plt.legend()

plt.figure()
plt.plot(time_intervals,I_d_ac,label='Displacement Current (A)',color='b')
plt.title('Displacement Current vs Time (AC Source)')
plt.xlabel('Time (s)')
plt.ylabel('Displacement Current (A)')
plt.grid(True)
plt.legend()

plt.show()
</textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="plotBox">
<img id="plot1">
<img id="plot2">
</div>

<script>
const codeEl=document.getElementById("code");
const lineNumbers=document.getElementById("lineNumbers");
const plotBox=document.getElementById("plotBox");
const plot1=document.getElementById("plot1");
const plot2=document.getElementById("plot2");

function updateLineNumbers(){
    const lines=codeEl.value.split("\n").length;
    let nums="";
    for(let i=1;i<=lines;i++) nums+=i+"\n";
    lineNumbers.textContent=nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", ()=> lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

let pyodideReady = loadPyodide();

async function run(){
    plotBox.style.display="none";

    let pyodide = await pyodideReady;
    await pyodide.loadPackage(["numpy","matplotlib"]);

    await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
from io import BytesIO
import base64
`);

    await pyodide.runPythonAsync(codeEl.value);

    let img1 = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.figure(1).savefig(buf,format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);

    let img2 = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.figure(2).savefig(buf,format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);

    plot1.src="data:image/png;base64,"+img1;
    plot2.src="data:image/png;base64,"+img2;
    plotBox.style.display="block";

    await pyodide.runPythonAsync(`
plt.figure(1).savefig("plot1.png")
plt.figure(2).savefig("plot2.png")
plt.figure(1).savefig("plot1.pdf")
plt.figure(2).savefig("plot2.pdf")
`);
}

async function savePNG(){
    let pyodide = await pyodideReady;
    let f1 = pyodide.FS.readFile("plot1.png");
    let f2 = pyodide.FS.readFile("plot2.png");

    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([f1],{type:"image/png"}));
    a.download="plot1.png";
    a.click();

    let b=document.createElement("a");
    b.href=URL.createObjectURL(new Blob([f2],{type:"image/png"}));
    b.download="plot2.png";
    b.click();
}

async function savePDF(){
    let pyodide = await pyodideReady;
    let f1 = pyodide.FS.readFile("plot1.pdf");
    let f2 = pyodide.FS.readFile("plot2.pdf");

    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([f1],{type:"application/pdf"}));
    a.download="plot1.pdf";
    a.click();

    let b=document.createElement("a");
    b.href=URL.createObjectURL(new Blob([f2],{type:"application/pdf"}));
    b.download="plot2.pdf";
    b.click();
}
</script>
</body>
