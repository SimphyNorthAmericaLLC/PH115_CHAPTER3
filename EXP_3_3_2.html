<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP_3_3_2</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
background:#1e1e1e;
color:white;
font-family:monospace;
padding:20px;
}

.editor{
display:flex;
border:1px solid #444;
}

#lineNumbers{
background:#111;
color:#00ff00;
padding:10px;
text-align:right;
white-space:pre;
user-select:none;
}

#code{
flex:1;
background:#111;
color:white;
border:none;
padding:10px;
resize:none;
overflow:auto;
white-space:pre;
line-height:1.35;
}

button{
margin-top:10px;
margin-right:10px;
padding:8px 14px;
background:#007acc;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:15px;
background:#111;
padding:10px;
}

#plotBox{
margin-top:15px;
background:white;
padding:10px;
display:none;
}

#plotBox img{
max-width:100%;
}
</style>
</head>

<body>

<h3>EXP_3_3_2 — RC Discharge</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="output"></div>

<div id="plotBox">
<img id="plotImg">
</div>

<script>

const defaultCode = `import numpy as np
import matplotlib.pyplot as plt
from scipy.integrate import solve_ivp

R = 1.0
C = 1.0
Q0 = 5.0

t_span = (0,5)
t_eval = np.linspace(0,5,1000)

def dQ_dt(t, Q):
    return -Q/(R*C)

solution = solve_ivp(dQ_dt, t_span, [Q0], t_eval=t_eval)

Q_t = solution.y[0]
V_t = Q_t/C
I_t = np.gradient(Q_t, t_eval)/R

plt.figure(figsize=(12,8))

plt.subplot(3,1,1)
plt.plot(solution.t, Q_t)
plt.title("Discharging of a Capacitor in an RC Circuit")
plt.xlabel("Time (s)")
plt.ylabel("Charge (C)")
plt.grid(True)

plt.subplot(3,1,2)
plt.plot(solution.t, V_t)
plt.xlabel("Time (s)")
plt.ylabel("Potential (V)")
plt.grid(True)

plt.subplot(3,1,3)
plt.plot(solution.t, I_t)
plt.xlabel("Time (s)")
plt.ylabel("Current (A)")
plt.grid(True)

plt.tight_layout()
plt.show()
`

const code = document.getElementById("code")
const lines = document.getElementById("lineNumbers")
const output = document.getElementById("output")
const plotImg = document.getElementById("plotImg")
const plotBox = document.getElementById("plotBox")

code.value = defaultCode

function updateLines(){
let n = code.value.split("\n").length
let s = ""
for(let i=1;i<=n;i++) s += i + "\n"
lines.textContent = s
}

updateLines()

code.addEventListener("input", updateLines)
code.addEventListener("scroll", ()=>lines.scrollTop = code.scrollTop)

let pyodideReady = loadPyodide()

async function run(){

plotBox.style.display="none"
output.innerText="Running..."

let pyodide = await pyodideReady

await pyodide.loadPackage(["numpy","matplotlib","micropip"])

await pyodide.runPythonAsync(`
import micropip
try:
    import scipy
except:
    await micropip.install("scipy")
`)

await pyodide.runPythonAsync(`
import sys, io, base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
sys.stdout = io.StringIO()
`)

await pyodide.runPythonAsync(code.value)

let stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()")
output.innerText = stdout

let figCount = await pyodide.runPythonAsync("len(plt.get_fignums())")

if(figCount>0){

let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.savefig(buf, format="png", dpi=150, bbox_inches="tight")
buf.seek(0)
import base64
base64.b64encode(buf.read()).decode("utf-8")
`)

plotImg.src = "data:image/png;base64,"+img
plotBox.style.display="block"

await pyodide.runPythonAsync(`
plt.savefig("plot.png", dpi=200)
plt.savefig("plot.pdf")
`)

}

}

async function savePNG(){
let pyodide = await pyodideReady
let data = pyodide.FS.readFile("plot.png")
let blob = new Blob([data], {type:"image/png"})
let url = URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="plot.png"
a.click()
}

async function savePDF(){
let pyodide = await pyodideReady
let data = pyodide.FS.readFile("plot.pdf")
let blob = new Blob([data], {type:"application/pdf"})
let url = URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="plot.pdf"
a.click()
}

</script>

</body>
</html>
