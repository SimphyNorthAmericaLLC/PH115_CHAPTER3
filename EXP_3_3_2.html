<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_3_3_2</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: monospace;
    padding: 15px;
}

.editor {
    display: flex;
    border: 1px solid #444;
    height: 340px;
}

#lineNumbers {
    background: #111;
    color: #00ff00;
    padding: 10px 8px;
    margin: 0;
    text-align: right;
    overflow: hidden;
    white-space: pre;
}

#code {
    flex: 1;
    background: #111;
    color: white;
    border: none;
    padding: 10px;
    resize: none;
    overflow: auto;
    white-space: pre;
}

button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 8px 14px;
    background: #007acc;
    color: white;
    border: none;
    cursor: pointer;
}

#output {
    background: #111;
    padding: 10px;
    margin-top: 10px;
    min-height: 80px;
    white-space: pre-wrap;
}

#plot {
    margin-top: 15px;
    background: white;

}
</style>
</head>

<body>

<h3>EXP_3_3_2 — RC Discharge</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt
from scipy.integrate import solve_ivp

R = 1.0
C = 1.0
Q0 = 5.0

t_span = (0,5)
t_eval = np.linspace(0,5,1000)

def dQ_dt(t, Q):
    return -Q/(R*C)

solution = solve_ivp(dQ_dt, t_span, [Q0], t_eval=t_eval)

Q_t = solution.y[0]
V_t = Q_t/C
I_t = np.gradient(Q_t, t_eval)/R

plt.figure(figsize=(12,8))

plt.subplot(3,1,1)
plt.plot(solution.t, Q_t)
plt.title("Discharging of a Capacitor in an RC Circuit")
plt.xlabel("Time (s)")
plt.ylabel("Charge (C)")
plt.grid(True)

plt.subplot(3,1,2)
plt.plot(solution.t, V_t)
plt.xlabel("Time (s)")
plt.ylabel("Potential (V)")
plt.grid(True)

plt.subplot(3,1,3)
plt.plot(solution.t, I_t)
plt.xlabel("Time (s)")
plt.ylabel("Current (A)")
plt.grid(True)

plt.tight_layout()
plt.show()
</textarea>
</div>

<button onclick="run()">Run</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="output"></div>

<div id="plot"></div>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const codeEl = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = codeEl.value.split("\n").length;
    let nums = "";
    for (let i = 1; i <= lines; i++) nums += i + "\n";
    lineNumbers.textContent = nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", () => lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

async function run() {
    pyodide = await pyodideReady;
    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").innerHTML = "";

    await pyodide.loadPackage(["numpy", "matplotlib", "micropip"]);

    try {
        await pyodide.runPythonAsync(`
import micropip
try:
    import scipy
except:
    await micropip.install("scipy")
`);

        await pyodide.runPythonAsync(`
import sys, io, base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
sys.stdout = io.StringIO()
`);

        await pyodide.runPythonAsync(codeEl.value);

        let out = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = out;

        const figCount = await pyodide.runPythonAsync("len(plt.get_fignums())");
        if (figCount > 0) {
            const img = await pyodide.runPythonAsync(`
buf = BytesIO()
plt.savefig(buf, format="png", dpi=150, bbox_inches="tight")
buf.seek(0)
base64.b64encode(buf.read()).decode("utf-8")
`);
            document.getElementById("plot").innerHTML =
                "<img id='plotImage' src='data:image/png;base64," + img + "'/>";

            await pyodide.runPythonAsync(`
plt.savefig("plot.png", dpi=200)
plt.savefig("plot.pdf")
`);
        }
    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

async function savePNG(){
    let pyodide = await pyodideReady;
    let data = pyodide.FS.readFile("plot.png");
    let blob = new Blob([data], {type:"image/png"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "plot.png";
    a.click();
}

async function savePDF(){
    let pyodide = await pyodideReady;
    let data = pyodide.FS.readFile("plot.pdf");
    let blob = new Blob([data], {type:"application/pdf"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "plot.pdf";
    a.click();
}
</script>

</body>
</html>
