<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP_3_2_3b</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
background:#1e1e1e;
color:white;
font-family:monospace;
padding:20px;
}

.editor{
display:flex;
border:1px solid #444;
}

#lineNumbers{
background:#111;
color:#00ff00;
padding:10px;
text-align:right;
white-space:pre;
user-select:none;
}

#code{
flex:1;
background:#111;
color:white;
border:none;
padding:10px;
resize:none;
overflow:auto;
white-space:pre;
line-height:1.35;
}

button{
margin-top:10px;
padding:8px 14px;
background:#007acc;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:20px;
background:#111;
padding:10px;
}

#plotBox{
margin-top:15px;
background:white;
padding:10px;
display:none;
}

#plotBox img{
max-width:100%;
}
</style>
</head>

<body>

<h3>EXP_3_2_3b — Falling Object with Drag</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run</button>

<div id="output"></div>

<div id="plotBox">
<img id="plotImg">
</div>

<script>

const defaultCode = `import numpy as np
import matplotlib.pyplot as plt
from scipy.integrate import solve_ivp

g = 9.81
m = 70.0
b = 12.5

t_span = (0, 15)
t_eval = np.linspace(0, 15, 1000)

def dv_dt(t, v):
    return g - (b / m) * v

v0 = [0]

solution = solve_ivp(dv_dt, t_span, v0, t_eval=t_eval)

v_t = solution.y[0]

v_term = m * g / b

plt.figure(figsize=(10,6))
plt.plot(solution.t, v_t)
plt.axhline(y=v_term, linestyle="--")
plt.xlabel("Time (s)")
plt.ylabel("Velocity (m/s)")
plt.title("Velocity of a Falling Object with Air Resistance")
plt.grid(True)
plt.show()
`

const code = document.getElementById("code")
const lines = document.getElementById("lineNumbers")
const output = document.getElementById("output")
const plotImg = document.getElementById("plotImg")
const plotBox = document.getElementById("plotBox")

code.value = defaultCode

function updateLines(){
let n = code.value.split("\n").length
let s = ""
for(let i=1;i<=n;i++) s += i + "\n"
lines.textContent = s
}

updateLines()

code.addEventListener("input", updateLines)
code.addEventListener("scroll", ()=>lines.scrollTop = code.scrollTop)

let pyodideReady = loadPyodide()

async function run(){

plotBox.style.display="none"
output.innerText="Running..."

let pyodide = await pyodideReady

await pyodide.loadPackage(["numpy","matplotlib","micropip"])

await pyodide.runPythonAsync(`
import micropip
try:
    import scipy
except:
    await micropip.install("scipy")
`)

await pyodide.runPythonAsync(`
import sys, io, base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
sys.stdout = io.StringIO()
`)

await pyodide.runPythonAsync(code.value)

let stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()")
output.innerText = stdout

let figCount = await pyodide.runPythonAsync("len(plt.get_fignums())")

if(figCount>0){

let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.savefig(buf, format="png", dpi=150, bbox_inches="tight")
buf.seek(0)
base64.b64encode(buf.read()).decode("utf-8")
`)

plotImg.src = "data:image/png;base64,"+img
plotBox.style.display="block"

}

}

</script>

</body>
</html>
